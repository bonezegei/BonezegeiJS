<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonezegei JS - Todo App</title>
    
    <style>
        /* Modern, clean CSS variables and global styling */
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success-color: #10b981;
            --danger-color: #f43f5e;
            --danger-hover: #e11d48;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05), 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Container Layout */
        .todo-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 30px 30px 20px 30px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
        }

        header h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Form styling (Kept static/outside target to prevent focus reset on input) */
        #todo-form {
            display: flex;
            gap: 10px;
            padding: 24px 30px;
            background-color: #fafbfc;
            border-bottom: 1px solid var(--border-color);
        }

        #todo-input {
            flex-grow: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        #todo-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        #todo-form button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        #todo-form button:hover {
            background-color: var(--primary-hover);
        }

        /* Render Canvas (Dynamic Bonezegei App target) */
        #app {
            padding: 20px 30px 30px 30px;
        }

        /* Stats Bar inside the dynamic template */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            background-color: #f1f5f9;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .stats-bar strong {
            color: var(--text-main);
        }

        /* Todo List */
        .todo-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 320px;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* Individual Todo Item elements rendered within the template */
        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background-color: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
        }

        .todo-item:hover {
            border-color: #cbd5e1;
            transform: translateY(-1px);
        }

        .todo-item.completed {
            background-color: #f8fafc;
            border-color: var(--border-color);
        }

        .todo-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
            cursor: pointer;
        }

        /* Custom toggle icon indicator */
        .todo-checkbox {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            font-size: 11px;
            font-weight: bold;
            color: white;
            user-select: none;
        }

        .todo-item.completed .todo-checkbox {
            background-color: var(--success-color);
            border-color: var(--success-color);
        }

        .todo-item.completed .todo-checkbox::after {
            content: "✓";
        }

        .todo-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            transition: all 0.15s ease;
        }

        .todo-item.completed .todo-text {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        /* Action Buttons inside template */
        .delete-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            padding: 6px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .delete-btn:hover {
            color: var(--danger-color);
            background-color: #fff1f2;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .empty-icon {
            font-size: 32px;
            margin-bottom: 10px;
            display: block;
        }

        /* Small Footer Information */
        .app-footer {
            margin-top: 20px;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="todo-container">
        <!-- Header -->
        <header>
            <h1>My Space</h1>
            <p>Bonezegei JS Reactive Todo Application</p>
        </header>

        <!-- Static Input Form (Placed outside target, avoiding render focus interruptions) -->
        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="Add a new task..." required autocomplete="off">
            <button type="submit">Add Task</button>
        </form>

        <!-- BEGIN TARGET CANVAS FOR BONEZEGEI JS -->
        <!-- Contains templated variables inside dynamic double braces -->
        <div id="app">
            <!-- Dynamic stats -->
            <div class="stats-bar">
                <span>Total Items: <strong>{{ total }}</strong></span>
                <span>Completed: <strong>{{ completed }}</strong></span>
            </div>
            
            <!-- Dynamic list injector -->
            <ul class="todo-list">
                {{ todoList }}
            </ul>
        </div>
        <!-- END TARGET CANVAS FOR BONEZEGEI JS -->
    </div>

    <div class="app-footer">
        Powered by Bonezegei JS template engine
    </div>

    <!-- Scripting Layer -->
    <script type="module">
        import Bonezegei from 'https://cdn.jsdelivr.net/npm/@bonezegei/bonezegeijs@1.0.2/src/Bonezegei.js';

        const bz = new Bonezegei();
        const render = bz.createRenderer();

        // 1. Initial State Data 
        const state = {
            todos: [
                { id: 1, text: "Learn the fundamentals of Bonezegei JS", completed: true },
                { id: 2, text: "Build a dynamic custom application without Tailwind", completed: false },
                { id: 3, text: "Explore ESM import structures in plain HTML", completed: false }
            ],
            total: 3,
            completed: 1,
            todoList: "" // Holds the pre-compiled HTML representation to pass to the engine
        };

        // 2. Main Render Pipeline
        function updateApp() {
            // Compute current metrics
            state.total = state.todos.length;
            state.completed = state.todos.filter(t => t.completed).length;

            // Generate compiled Todo items HTML to render with Bonezegei
            if (state.todos.length === 0) {
                state.todoList = `
                    <div class="empty-state">
                        <span class="empty-icon">🎉</span>
                        <p>All caught up! Create a task to get started.</p>
                    </div>
                `;
            } else {
                state.todoList = state.todos.map(todo => `
                    <li class="todo-item ${todo.completed ? 'completed' : ''}">
                        <div class="todo-left" data-action="toggle" data-id="${todo.id}">
                            <div class="todo-checkbox"></div>
                            <span class="todo-text">${escapeHTML(todo.text)}</span>
                        </div>
                        <button class="delete-btn" data-action="delete" data-id="${todo.id}" title="Delete item">
                            🗑️
                        </button>
                    </li>
                `).join('');
            }

            // Execute Bonezegei Render Process
            render('#app', state);
        }

        // Helper: Escape user input to prevent XSS issues inside string-rendered lists
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // 3. Form Input Submission Handler
        const form = document.getElementById('todo-form');
        const input = document.getElementById('todo-input');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;

            // Append new item to the active state model
            state.todos.push({
                id: Date.now(),
                text: text,
                completed: false
            });

            // Reset input focus and values
            input.value = '';
            input.focus();

            // Trigger reactive render
            updateApp();
        });

        // 4. Delegated Event Handling for Rendered Elements
        // Since Bonezegei regenerates the inner elements, event delegation on the root '#app' ensures handlers remain active.
        const appContainer = document.getElementById('app');

        appContainer.addEventListener('click', (e) => {
            // Check if the user clicked the toggle container
            const toggleElement = e.target.closest('[data-action="toggle"]');
            if (toggleElement) {
                const id = parseInt(toggleElement.getAttribute('data-id'));
                toggleTodo(id);
                return;
            }

            // Check if the user clicked the delete button
            const deleteButton = e.target.closest('[data-action="delete"]');
            if (deleteButton) {
                const id = parseInt(deleteButton.getAttribute('data-id'));
                deleteTodo(id);
                return;
            }
        });

        // State Action: Toggle Completed Property
        function toggleTodo(id) {
            state.todos = state.todos.map(todo => {
                if (todo.id === id) {
                    return { ...todo, completed: !todo.completed };
                }
                return todo;
            });
            updateApp();
        }

        // State Action: Remove Todo Property
        function deleteTodo(id) {
            state.todos = state.todos.filter(todo => todo.id !== id);
            updateApp();
        }

        // 5. Initial Execution Trigger
        updateApp();
    </script>
</body>
</html>
